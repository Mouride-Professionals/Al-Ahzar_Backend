name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  pull_request:
    paths:
      - "infra/terraform/**"

jobs:
  terraform:
    name: Plan & Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          # Terraform Cloud token — stored in GitHub secret TF_API_TOKEN
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color
        # Variables are stored in the Terraform Cloud workspace (al-azhar-production)
        # Nothing sensitive is passed here

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -no-color
